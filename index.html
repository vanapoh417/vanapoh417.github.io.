<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Иван — школьный альбом</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: #1a1a1a;
color: #e0e0e0;
font-family: 'Segoe UI', system-ui, sans-serif;
line-height: 1.6;
min-height: 100vh;
display: flex;
justify-content: center;
padding: 40px 20px 60px;
}

.container {
max-width: 650px;
width: 100%;
}

/* Заголовок */
.hero {
text-align: center;
margin-bottom: 50px;
}

.hero h1 {
font-size: 3.5rem;
font-weight: 700;
color: #ffffff;
letter-spacing: -1px;
margin-bottom: 8px;
}

.hero .nickname {
font-size: 1.2rem;
color: #b0b0b0;
font-weight: 400;
}

.accent-dot {
color: #ffb347;
}

/* Цитата */
.quote-block {
background: #252525;
border-left: 4px solid #ffb347;
padding: 30px 35px;
margin-bottom: 50px;
border-radius: 0 12px 12px 0;
position: relative;
}

.quote-block .marks {
position: absolute;
top: -15px;
left: 20px;
font-size: 4rem;
color: #ffb347;
opacity: 0.5;
line-height: 1;
}

.quote-text {
font-size: 1.3rem;
font-style: italic;
color: #f0f0f0;
margin-bottom: 12px;
}

.quote-author {
font-size: 0.95rem;
color: #888;
text-align: right;
}

/* Фотогалерея */
.gallery {
display: grid;
grid-template-columns: repeat(2, 1fr);
gap: 15px;
margin-bottom: 60px;
}

.gallery-item {
aspect-ratio: 1 / 1;
background: #2a2a2a;
border-radius: 12px;
overflow: hidden;
transition: transform 0.3s ease;
display: flex;
align-items: center;
justify-content: center;
}

.gallery-item:hover {
transform: scale(1.02);
}

.gallery-item img {
width: 100%;
height: 100%;
object-fit: cover;
display: block;
}

/* Пятое фото будет по центру и шире */
.gallery-item:nth-child(5) {
grid-column: 1 / -1;
aspect-ratio: 2 / 1;
}

/* Заглушки */
.placeholder {
color: #555;
font-size: 0.85rem;
text-align: center;
padding: 20px;
}

/* Подвал */
.footer {
text-align: center;
padding-top: 30px;
border-top: 1px solid #2a2a2a;
color: #666;
font-size: 0.9rem;
}

.footer a {
color: #ffb347;
text-decoration: none;
}

/* Адаптация для телефона */
@media (max-width: 500px) {
.hero h1 { font-size: 2.5rem; }
.gallery { grid-template-columns: 1fr; gap: 12px; }
.gallery-item:nth-child(5) { grid-column: 1; aspect-ratio: 1/1; }
.quote-block { padding: 20px; }
.quote-text { font-size: 1.1rem; }
}
</style>
</head>
<body>
<div class="container">

<!-- ИМЯ -->
<div class="hero">
<h1>Иван</h1>
<p class="nickname">он же <span class="accent-dot">Ваня</span></p>
</div>

<!-- ЦИТАТА — напиши свою -->
<div class="quote-block">
<div class="marks">❝</div>
<p class="quote-text">incognito ergo sum.</p>
<p class="quote-author">— Joseph Brodsky</p>
</div>

<!-- ФОТОГРАФИИ — замени src на свои -->
<div class="gallery">
<div class="gallery-item">
<img src="photo1.jpg" alt="Фото 1" loading="lazy">
</div>
<div class="gallery-item">
<img src="photo2.jpg" alt="Фото 2" loading="lazy">
</div>
<div class="gallery-item">
<img src="photo3.jpg" alt="Фото 3" loading="lazy">
</div>
<div class="gallery-item">
<img src="photo4.jpg" alt="Фото 4" loading="lazy">
</div>
<div class="gallery-item">
<img src="photo5.jpg" alt="Фото 5" loading="lazy">
</div>
</div>

<!-- ПОДВАЛ -->
<div class="footer">
<p>Страница для школьного альбома</p>
<p>Ваня <span class="accent-dot">•</span> выпуск <span id="year"></span></p>
</div>

</div>

<script>
// Автоматически подставляет текущий год
document.getElementById('year').textContent = new Date().getFullYear();
</script>
</body>
</html>
